<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none" aria-hidden="true" role="img">
  <title>Floyd County, Northwest Georgia, with Rome marked</title>
  <!-- decorative compass tick north -->
  <g stroke="currentColor" stroke-width="1" stroke-opacity="0.45" stroke-linecap="round">
    <path d="M120 14v10"/>
    <text x="120" y="11" text-anchor="middle" fill="currentColor" fill-opacity="0.55" font-family="Inter, sans-serif" font-size="9" letter-spacing="2">N</text>
  </g>

  <!-- stylized Floyd County polygon (NW Georgia, abstract not GIS-accurate) -->
  <path d="M62 52 L88 38 L132 42 L168 50 L186 70 L194 100 L196 132 L188 164 L172 190 L142 200 L102 200 L72 188 L52 162 L46 132 L52 96 L56 72 Z"
        stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"
        fill="currentColor" fill-opacity="0.06"/>

  <!-- river suggestion (Coosa) running through Rome -->
  <path d="M70 86 C 90 96, 110 110, 122 122 C 134 134, 146 156, 168 174"
        stroke="currentColor" stroke-width="1" stroke-opacity="0.35" stroke-linecap="round" fill="none"/>

  <!-- pin marker for Rome (centroid) -->
  <g transform="translate(120 122)">
    <circle r="22" fill="#E8B958" fill-opacity="0.18"/>
    <circle r="13" fill="#E8B958" fill-opacity="0.32"/>
    <circle r="6"  fill="#E8B958"/>
    <circle r="2.5" fill="#0F1B33"/>
  </g>

  <!-- Rome label -->
  <text x="120" y="156" text-anchor="middle" fill="currentColor" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="2">ROME</text>
</svg>
